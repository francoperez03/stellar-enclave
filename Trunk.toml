[build]
target = "app/index.html"
public-url = "/"
dist = "dist"
filehash = false
release = true

[watch]
watch = ["app", "circuits"]
ignore = ["app/node_modules", "dist"]

[serve]
addresses = ["0.0.0.0"]
port = 8000

[tools]
tailwindcss = "4.1.18"

# Copy all static assets to staging
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", """
mkdir -p $TRUNK_STAGING_DIR/circuits $TRUNK_STAGING_DIR/keys $TRUNK_STAGING_DIR/js/witness

# Circuit artifacts from Cargo build output
CIRCUIT_OUT=$(find target -path '*/build/circuits-*/out/circuits' -type d 2>/dev/null | head -1)
if [ -n "$CIRCUIT_OUT" ]; then
    cp "$CIRCUIT_OUT"/*.r1cs $TRUNK_STAGING_DIR/circuits/ 2>/dev/null || true
    cp "$CIRCUIT_OUT"/wasm/*_js/*.wasm $TRUNK_STAGING_DIR/circuits/ 2>/dev/null || true
fi

# Proving keys
cp scripts/testdata/*_proving_key.bin $TRUNK_STAGING_DIR/keys/ 2>/dev/null || true
cp scripts/testdata/*_vk.json $TRUNK_STAGING_DIR/keys/ 2>/dev/null || true

# Witness WASM module
cp target/wasm-witness/witness.js $TRUNK_STAGING_DIR/js/witness/ 2>/dev/null || true
cp target/wasm-witness/witness_bg.wasm $TRUNK_STAGING_DIR/js/witness/ 2>/dev/null || true

# Static files
cp app/js/bridge.js $TRUNK_STAGING_DIR/js/
cp app/admin.html $TRUNK_STAGING_DIR/ 2>/dev/null || true
cp scripts/deployments.json $TRUNK_STAGING_DIR/ 2>/dev/null || true
mkdir -p $TRUNK_STAGING_DIR/js/enclave
cp app/enclave.html $TRUNK_STAGING_DIR/ 2>/dev/null || true

# Build-time config — FACILITATOR_URL env var with localhost default.
# Consumed by app/js/enclave/index.js via window.ENCLAVE_CONFIG.
FACILITATOR_URL_VALUE="${FACILITATOR_URL:-http://localhost:4021}"
printf 'window.ENCLAVE_CONFIG=%s;\\n' "{\\"facilitatorUrl\\":\\"$FACILITATOR_URL_VALUE\\"}" > $TRUNK_STAGING_DIR/js/config.js
"""]

# Bundle JS with esbuild
[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", """
./app/node_modules/.bin/esbuild app/js/ui.js --external:./prover.js --external:./witness/* --bundle --outfile=$TRUNK_STAGING_DIR/js/ui.js --format=esm
./app/node_modules/.bin/esbuild app/js/worker.js --external:./prover.js --external:./witness/* --bundle --outfile=$TRUNK_STAGING_DIR/js/worker.js --format=esm
./app/node_modules/.bin/esbuild app/js/admin.js --external:./bridge.js --bundle --outfile=$TRUNK_STAGING_DIR/js/admin.js --format=esm
cp target/wasm-bindgen/release/prover.js app/js/prover.js
mkdir -p app/js/witness
cp target/wasm-witness/witness.js app/js/witness/witness.js 2>/dev/null || true
./app/node_modules/.bin/esbuild app/js/enclave/index.js --external:./prover.js --external:./witness/* --bundle --outfile=$TRUNK_STAGING_DIR/js/enclave/index.js --format=esm
rm -f app/js/prover.js app/js/witness/witness.js
cp target/wasm-bindgen/release/prover.js $TRUNK_STAGING_DIR/js/enclave/prover.js 2>/dev/null || true
cp target/wasm-bindgen/release/prover_bg.wasm $TRUNK_STAGING_DIR/js/enclave/prover_bg.wasm 2>/dev/null || true
mkdir -p $TRUNK_STAGING_DIR/js/enclave/witness
cp target/wasm-witness/witness.js $TRUNK_STAGING_DIR/js/enclave/witness/witness.js 2>/dev/null || true
cp target/wasm-witness/witness_bg.wasm $TRUNK_STAGING_DIR/js/enclave/witness/witness_bg.wasm 2>/dev/null || true
cp $TRUNK_STAGING_DIR/js/worker.js $TRUNK_STAGING_DIR/js/enclave/worker.js 2>/dev/null || true
"""]
