<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#121832"/>
    </linearGradient>
    <linearGradient id="poolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#3a8bff"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8aa0c7"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e05a6e"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="candles" viewBox="0 0 100 60">
      <rect x="10"  y="22" width="8"  height="22" fill="#d4dbe8"/>
      <line x1="14" y1="12" x2="14" y2="52" stroke="#d4dbe8" stroke-width="2"/>
      <rect x="28"  y="14" width="8"  height="30" fill="#d4dbe8"/>
      <line x1="32" y1="6"  x2="32" y2="48" stroke="#d4dbe8" stroke-width="2"/>
      <rect x="46"  y="26" width="8"  height="18" fill="#d4dbe8"/>
      <line x1="50" y1="18" x2="50" y2="52" stroke="#d4dbe8" stroke-width="2"/>
      <rect x="64"  y="10" width="8"  height="34" fill="#d4dbe8"/>
      <line x1="68" y1="4"  x2="68" y2="50" stroke="#d4dbe8" stroke-width="2"/>
      <rect x="82"  y="20" width="8"  height="24" fill="#d4dbe8"/>
      <line x1="86" y1="10" x2="86" y2="50" stroke="#d4dbe8" stroke-width="2"/>
    </symbol>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bgGrad)"/>

  <!-- wordmark -->
  <g transform="translate(80,70)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#3a8bff" stroke-width="4"/>
    <circle cx="0" cy="0" r="10" fill="#3a8bff"/>
    <text x="44" y="10" font-size="34" font-weight="700" fill="#eaf0ff" letter-spacing="1">ENCLAVE</text>
    <text x="44" y="42" font-size="17" font-weight="400" fill="#8aa0c7" letter-spacing="0.6">Shielded organizations for agentic commerce</text>
  </g>

  <!-- three rival fund cards (row) -->
  <g font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
    <!-- Northfield -->
    <g transform="translate(160,220)" filter="url(#softShadow)">
      <rect x="0" y="0" width="360" height="200" rx="16" fill="#1a2340" stroke="#2b3b68" stroke-width="2"/>
      <use href="#candles" x="24" y="30" width="120" height="72"/>
      <text x="24" y="140" font-size="28" font-weight="700" fill="#eaf0ff">Northfield Capital</text>
      <text x="24" y="168" font-size="17" fill="#8aa0c7">Quant fund · Agent fleet</text>
    </g>
    <!-- Ashford -->
    <g transform="translate(780,220)" filter="url(#softShadow)">
      <rect x="0" y="0" width="360" height="200" rx="16" fill="#1a2340" stroke="#2b3b68" stroke-width="2"/>
      <use href="#candles" x="24" y="30" width="120" height="72"/>
      <text x="24" y="140" font-size="28" font-weight="700" fill="#eaf0ff">Ashford Partners</text>
      <text x="24" y="168" font-size="17" fill="#8aa0c7">Quant fund · Agent fleet</text>
    </g>
    <!-- Bayridge -->
    <g transform="translate(1400,220)" filter="url(#softShadow)">
      <rect x="0" y="0" width="360" height="200" rx="16" fill="#1a2340" stroke="#2b3b68" stroke-width="2"/>
      <use href="#candles" x="24" y="30" width="120" height="72"/>
      <text x="24" y="140" font-size="28" font-weight="700" fill="#eaf0ff">Bayridge Capital</text>
      <text x="24" y="168" font-size="17" fill="#8aa0c7">Quant fund · Agent fleet</text>
    </g>
  </g>

  <!-- Arrows: three cards → pool -->
  <g stroke="#8aa0c7" stroke-width="3" fill="none">
    <path d="M340,420 C340,500 600,520 720,560" marker-end="url(#arrow)"/>
    <path d="M960,420 L960,560" marker-end="url(#arrow)"/>
    <path d="M1580,420 C1580,500 1320,520 1200,560" marker-end="url(#arrow)"/>
  </g>

  <!-- Shielded Pool (shared) -->
  <g transform="translate(720,560)" filter="url(#softShadow)">
    <rect x="0" y="0" width="480" height="160" rx="20" fill="url(#poolGrad)" stroke="#5aa6ff" stroke-width="2"/>
    <text x="240" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#ffffff">Shielded Pool</text>
    <text x="240" y="92" text-anchor="middle" font-size="18" fill="#dce7ff">Soroban · one shared on-chain ASP</text>
    <text x="240" y="122" text-anchor="middle" font-size="15" fill="#c6d5fb">Groth16 verifier · per-org spending key · notes</text>
  </g>
  <!-- Caption under pool -->
  <text x="960" y="748" text-anchor="middle" font-size="20" fill="#c6d5fb" font-style="italic">One shared pool · Three rival funds</text>

  <!-- Arrow: pool → facilitator -->
  <path d="M960,720 L960,800" stroke="#8aa0c7" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Facilitator -->
  <g transform="translate(720,800)" filter="url(#softShadow)">
    <rect x="0" y="0" width="480" height="120" rx="16" fill="#1a2340" stroke="#2b3b68" stroke-width="2"/>
    <text x="240" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#eaf0ff">Facilitator</text>
    <text x="240" y="82" text-anchor="middle" font-size="16" fill="#8aa0c7">Verifies proof · relays USDC · pays XLM gas · per-org policy</text>
  </g>

  <!-- Arrow: facilitator → x402 -->
  <path d="M960,920 L960,980" stroke="#8aa0c7" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- x402 endpoint -->
  <g transform="translate(720,980)" filter="url(#softShadow)">
    <rect x="0" y="0" width="480" height="70" rx="14" fill="#1a2340" stroke="#2b3b68" stroke-width="2"/>
    <text x="240" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#eaf0ff">x402 API endpoint</text>
  </g>

  <!-- Blocked-by-default sidecall (Ashford/Bayridge can't hit Northfield's endpoint) -->
  <g font-size="15" fill="#e05a6e">
    <text x="1530" y="860">Non-members blocked</text>
    <text x="1530" y="882" fill="#8aa0c7" font-size="14">(Ashford, Bayridge ✕ on Northfield's gate)</text>
  </g>
  <g stroke="#e05a6e" stroke-width="2.5" stroke-dasharray="8,6" fill="none">
    <path d="M1400,320 C1500,500 1600,700 1520,845" marker-end="url(#arrowRed)"/>
  </g>

  <!-- Footer rule -->
  <line x1="80" y1="1040" x2="1840" y2="1040" stroke="#2b3b68" stroke-width="1"/>
  <text x="80" y="1065" font-size="14" fill="#5f6f92">Shared on-chain ASP · per-org policy off-chain · Stellar testnet</text>
  <text x="1840" y="1065" text-anchor="end" font-size="14" fill="#5f6f92">Fork of NethermindEth/stellar-private-payments · Apache 2.0</text>
</svg>
